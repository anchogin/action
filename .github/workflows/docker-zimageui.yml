name: Build & Push z-image-ui Docker Image

on:
  #schedule:
    # 每周日0点（UTC时间）自动重建，跟进最新版本
    #- cron: '0 0 * * 0'
  workflow_dispatch:          # 手动触发，可按需添加其他触发条件（如 schedule）
  # push:                     # 若需要自动触发，可取消注释并指定分支
  #   branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/z-image-ui   # 推送到你的 GHCR 命名空间下

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout target repository (neosun100/z-image-turbo-ui)
        uses: actions/checkout@v4
        with:
          repository: neosun100/z-image-turbo-ui   # 目标仓库
          # 如果目标仓库是私有的，需要提供 token
          # token: ${{ secrets.PAT_OPENCHAMBER }} # 在 GitHub Secrets 中配置 PAT
          path: z-image-ui                    # 可选：指定检出目录，默认为当前目录
       # 新增：安装 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # 可改为你需要的版本（如 18, 22 等）
          cache: 'npm'
          cache-dependency-path: z-image-ui/frontend/package-lock.json

      # 新增：构建前端（cd frontend -> npm install -> npm run build）
      - name: Install dependencies and build frontend
        run: |
          cd z-image-ui/frontend
          npm install
          npm run build
        # 如果 npm run build 需要额外环境变量，可在此添加

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./z-image-ui                # 使用检出目录作为构建上下文
          file: ./z-image-ui/Dockerfile        # Dockerfile 路径（若文件名不同请调整）
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
